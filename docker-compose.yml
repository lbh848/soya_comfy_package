# ComfyPack - ComfyUI + Hooking Server Docker Compose
# Usage: docker compose up -d

services:
  comfyui:
    build:
      context: ./comfyui
      dockerfile: Dockerfile
    image: soyaslave/comfypack-comfyui:latest
    ports:
      - "${COMFYUI_PORT:-8188}:8188"
    volumes:
      - ${MODEL_PATH:-./comfyui/models}:/models
      - ${INPUT_PATH:-./comfyui/input}:/app/comfyui/input
      - ${OUTPUT_PATH:-./comfyui/output}:/app/comfyui/output
      - ${SNAPSHOT_PATH:-./comfyui/snapshots}:/app/comfyui/user/__manager/snapshots
      - ${USER_NODES_PATH:-./comfyui/user_nodes}:/app/user_nodes
      - ${WORKFLOW_PATH:-./comfyui/workflows}:/app/comfyui/user/default/workflows
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/system_stats"]
      interval: 30s
      timeout: 10s
      retries: 5

  hooking_server:
    build:
      context: ./hooking_server
      dockerfile: Dockerfile
    image: soyaslave/comfypack-hooking:latest
    ports:
      - "${HOOKING_PORT:-8189}:8189"
    volumes:
      - ${HOOKING_SERVER_SRC:-./hooking_server/app}:/app
      - ${PATCH_DATA_PATH:-./hooking_server/patch_data}/asset:/app/asset
      - ${PATCH_DATA_PATH:-./hooking_server/patch_data}/asset_data:/app/asset_data
      - ${PATCH_DATA_PATH:-./hooking_server/patch_data}/chain_presets:/app/chain_presets
      - ${PATCH_DATA_PATH:-./hooking_server/patch_data}/customprompt:/app/customprompt
      - ${PATCH_DATA_PATH:-./hooking_server/patch_data}/pose_data:/app/pose_data
      - ${PATCH_DATA_PATH:-./hooking_server/patch_data}/auto_complete:/app/auto_complete
      - ${PATCH_DATA_PATH:-./hooking_server/patch_data}/workflow:/app/workflow
      - ${PATCH_DATA_PATH:-./hooking_server/patch_data}/mode_workflow:/app/mode_workflow
      - ${CONFIG_PATH:-./config/config.json}:/app/config.json
      - hooking_logs:/app/logs
      - ${PATCH_DATA_PATH:-./hooking_server/patch_data}/workflow_backup:/app/workflow_backup
      - ${PATCH_DATA_PATH:-./hooking_server/patch_data}/workflow_backup_static:/app/workflow_backup_static
      - ${PATCH_DATA_PATH:-./hooking_server/patch_data}/current_work:/app/current_work
      - ${PATCH_DATA_PATH:-./hooking_server/patch_data}/current_mode_workflow:/app/current_mode_workflow
    environment:
      - REAL_COMFY_HOST=comfyui
      - REAL_COMFY_PORT=8188
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      comfyui:
        condition: service_healthy
    restart: unless-stopped

volumes:
  hooking_logs:
