# ComfyPack - ComfyUI + Hooking Server Docker Compose
# Usage: docker compose up -d

services:
  comfyui:
    build:
      context: ./comfyui
      dockerfile: Dockerfile
    image: soya/comfypack-comfyui:latest
    ports:
      - "${COMFYUI_PORT:-8188}:8188"
    volumes:
      - ${MODEL_PATH:-./models}:/models
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/system_stats"]
      interval: 30s
      timeout: 10s
      retries: 5

  hooking_server:
    build:
      context: ./hooking_server
      dockerfile: Dockerfile
    image: soya/comfypack-hooking:latest
    ports:
      - "${HOOKING_PORT:-8189}:8189"
    volumes:
      - ${PATCH_DATA_PATH:-./patch_data}/asset:/app/asset
      - ${PATCH_DATA_PATH:-./patch_data}/asset_data:/app/asset_data
      - ${PATCH_DATA_PATH:-./patch_data}/chain_presets:/app/chain_presets
      - ${PATCH_DATA_PATH:-./patch_data}/customprompt:/app/customprompt
      - ${PATCH_DATA_PATH:-./patch_data}/pose_data:/app/pose_data
      - ${PATCH_DATA_PATH:-./patch_data}/auto_complete:/app/auto_complete
      - ${PATCH_DATA_PATH:-./patch_data}/workflow:/app/workflow
      - ${PATCH_DATA_PATH:-./patch_data}/mode_workflow:/app/mode_workflow
      - ${CONFIG_PATH:-./config}:/app/config.json
      - hooking_logs:/app/logs
      - hooking_backup:/app/workflow_backup
      - hooking_backup_static:/app/workflow_backup_static
      - hooking_current:/app/current_work
      - hooking_current_mode:/app/current_mode_workflow
    environment:
      - REAL_COMFY_HOST=comfyui
      - REAL_COMFY_PORT=8188
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      comfyui:
        condition: service_healthy
    restart: unless-stopped

volumes:
  hooking_logs:
  hooking_backup:
  hooking_backup_static:
  hooking_current:
  hooking_current_mode:
