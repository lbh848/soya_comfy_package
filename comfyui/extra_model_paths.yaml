# ComfyPack - Extra Model Paths
# Models are loaded from the host's mounted /models directory
# Users should organize their models folder like this:
#
# /models/
# ├── checkpoints/
# ├── loras/
# ├── controlnet/
# ├── ipadapter/
# ├── clip/
# ├── clip_vision/
# ├── upscale_models/
# ├── ultralytics/
# │   ├── bbox/
# │   └── segm/
# ├── vae/
# ├── unet/
# └── taggers/

# Models are now directly mounted at /app/comfyui/models
# No extra paths needed - ComfyUI uses its default models directory
